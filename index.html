<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Earn Master</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .video-container { width: 100vw; height: 100vh; scroll-snap-type: y mandatory; overflow-y: scroll; }
        .video-card { width: 100vw; height: 100vh; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        .video-box { width: 100%; height: 90%; background: #000; }
        iframe { width: 100%; height: 100%; border: none; pointer-events: auto; }
        .overlay { position: absolute; bottom: 100px; left: 20px; z-index: 10; }
        .user-balance-box { background: rgba(0,255,0,0.3); border: 1px solid #0f0; padding: 10px; border-radius: 15px; color: #0f0; font-weight: bold; }
        #ownerDashboard { position: fixed; top: 10px; right: 10px; background: #f1c40f; color: #000; padding: 10px; border-radius: 10px; z-index: 1000; font-weight: bold; }
        .btn-withdraw { position: fixed; bottom: 30px; right: 20px; background: #f1c40f; color: #000; padding: 15px; border-radius: 50px; border: none; font-weight: bold; z-index: 100; }
    </style>
</head>
<body>

    <div id="ownerDashboard">NAINA VAULT: ₹<span id="ownerMoney">0.00</span></div>
    <div class="video-container" id="feed"></div>
    <button class="btn-withdraw" onclick="paisaNikalo()">WITHDRAW MONEY</button>

<script>
    let nainaTotalVault = 3799; // Aapka purana balance
    let userVisibleMoney = 0;
    const reels = ['dQw4w9WgXcQ', '3JZ_D3ELwOQ', '2Vv-BfVoq4g', 'tgbNymZ7vqY'];

    function buildFeed() {
        const feed = document.getElementById('feed');
        reels.forEach((id) => {
            const card = document.createElement('div');
            card.className = 'video-card';
            card.dataset.id = id;
            card.innerHTML = `
                <div class="video-box" id="player-${id}">
                    <p style="text-align:center; padding-top:50%;">Loading Video...</p>
                </div>
                <div class="overlay">
                    <div class="user-balance-box">Kamai: ₹<span class="userBalDisplay">0.00</span></div>
                    <p>@V-Earn_Official</p>
                </div>`;
            feed.appendChild(card);
        });
        startSmartObserver();
    }

    function startSmartObserver() {
        const options = { threshold: 0.8 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const id = entry.target.dataset.id;
                const box = document.getElementById(`player-${id}`);
                if (entry.isIntersecting) {
                    // Sirf active video ko load aur play karo
                    box.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&mute=0&controls=0&loop=1&playlist=${id}" allow="autoplay"></iframe>`;
                    calculateProfit();
                } else {
                    // Screen se bahar jate hi video band
                    box.innerHTML = `<p style="text-align:center; padding-top:50%;">Paused</p>`;
                }
            });
        }, options);

        document.querySelectorAll('.video-card').forEach(card => observer.observe(card));
    }

    function calculateProfit() {
        let gain = Math.floor(Math.random() * 50) + 5;
        nainaTotalVault += gain;
        userVisibleMoney += 1;
        updateVault();
    }

    function updateVault() {
        document.getElementById('ownerMoney').innerText = nainaTotalVault.toFixed(2);
        document.querySelectorAll('.userBalDisplay').forEach(d => d.innerText = userVisibleMoney.toFixed(2));
    }

    function paisaNikalo() {
        alert("Naina Vault Profit Locked: ₹" + nainaTotalVault);
    }

    buildFeed();
</script>
</body>
</html>
